services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wingsfin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wingsfin}
      POSTGRES_DB: ${POSTGRES_DB:-wingsfin}
    command: >
      sh -c "
      if [ -f /var/lib/postgresql/data/postmaster.pid ] && ! head -n 1 /var/lib/postgresql/data/postmaster.pid | grep -Eq '^[0-9]+$'; then
        rm -f /var/lib/postgresql/data/postmaster.pid;
      fi;
      exec docker-entrypoint.sh postgres
      "
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wingsfin} -d ${POSTGRES_DB:-wingsfin}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://wingsfin:wingsfin@postgres:5432/wingsfin}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:8080}
      MARKET_TIMEZONE: ${MARKET_TIMEZONE:-Asia/Dhaka}
      MARKET_OPEN_TIME: ${MARKET_OPEN_TIME:-10:00}
      MARKET_CLOSE_TIME: ${MARKET_CLOSE_TIME:-14:30}
      MARKET_STATUS_OVERRIDE: ${MARKET_STATUS_OVERRIDE:-auto}
      DEFAULT_INDEX_SYMBOL: ${DEFAULT_INDEX_SYMBOL:-DSEX}
      DEFAULT_STOCK_SYMBOL: ${DEFAULT_STOCK_SYMBOL:-GP}
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "node dist/scripts/migrate.js && node dist/scripts/seed.js && node dist/server.js"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infra/pgadmin/pgpass:/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  pgadmin-data:
